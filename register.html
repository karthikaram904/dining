<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="images/icons/favicon.png"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
 <!-- Google Font -->
   <link href="https://fonts.googleapis.com/css2?family=Courgette&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="css/util.css">

<title>Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f5f5f5;
    color:#111;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:background .3s, color .3s;
}


body.dark {
    background:#000;
    color:#fff;
}

.title-section-ourmenu.t-center.m-b-22 h3 {
  font-size: 23px !important;
  font-family:'Poppins',sans-serif;
}

/* AUTH BOX */
.register-box{
    width:100%;
    max-width:420px;
    background:#fff;
    padding:40px 30px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:background .3s, color .3s, box-shadow .3s;
}

body.dark .register-box {
    background:#111;
    color:#f5f5f5;
    box-shadow:0 10px 25px rgba(255,255,255,0.06);
}

/* LOGO */

.dark .register-logo img{
    width:120px;
    margin-bottom:20px;
    filter: none;
}
.register-logo img {
  width: 120px;
  margin-bottom: 20px;
  filter: brightness(0) saturate(100%) invert(17%) sepia(96%) saturate(2877%) hue-rotate(345deg) brightness(95%);
}

body.dark .register-logo img{
    filter: brightness(0) invert(1);
}

/* TITLE */
.register-box p{
    margin-bottom:20px;
    color:inherit;
}
.register-box h2
{
    font-weight:700;
    line-height:1.2;
    font-size:35px;
    margin-bottom:10px;
    color:inherit;
}

/* INPUT */
.register-box input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:6px;
    outline:none;
    font-size:15px;
    background:#fff;
    color:#111;
}

body.dark .register-box input{
    background:#181818;
    border-color:#333;
    color:#f5f5f5;
}

body.dark .register-box input::placeholder{
    color:#aaa;
}

/* PASSWORD */
.password-box{
    position:relative;
}

.password-box i{
    position:absolute;
    right:12px;
    top:35%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#888;
}

body.dark .password-box i{
    color:#ccc;
}

/* BUTTON */
.register-box button{
    width:100%;
    padding:12px;
    background:#d61c22;
    border:none;
    border-radius:6px;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.register-box button:hover{
    background:#000;
}

/* SOCIAL */
.social-login{
    margin-top:20px;
}

.social-login p{
    margin-bottom:12px;
    color:#777;
}

body.dark .social-login p{
    color:#ccc;
}

.social-icons{
    display:flex;
    justify-content:center;
    gap:12px;
}

.social-btn{
    width:45px;
    height:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:8px;
    color:#fff;
    text-decoration:none;
    background:#111;
    border:1px solid rgba(255,255,255,0.08);
    transition:transform .3s, background .3s, border-color .3s;
}

.social-btn i{
    font-size:1.2rem;
}

.social-btn:hover{
    background:#d61c22;
    border-color:#d61c22;
    transform:translateY(-2px);
}

.facebook,
.google,
.twitter,
.apple{
    background:inherit;
    color:inherit;
}

/* LOGIN LINK */
.login-link{
    margin-top:20px;
}

.login-link a{
    color:#d61c22;
    text-decoration:none;
}

body.dark .login-link a{
    color:#f5f5f5;
}

body.dark .tit2, body.dark .tit3 {
    color: #fff !important;
}

/* MOBILE */
@media(max-width:480px){
    .register-box{
        margin:20px;
        padding:30px 20px;
    }
}

/* Floating theme btn */
.auth-theme-btn{
    position:fixed;
    top:16px;
    right:16px;
    width:38px;
    height:38px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.7);
    background:transparent;
    color:#fff;
    font-size:15px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 0.3s ease;
    z-index:999;
}
.auth-theme-btn:hover{
    background:#d61c22;
    border-color:#d61c22;
}
body:not(.dark) .auth-theme-btn{
    border-color:rgba(17,17,17,0.4);
    color:#111;
}

</style>
</head>

<body>

<button class="auth-theme-btn" id="auth-theme-btn" title="Toggle Theme"><i class="fa-solid fa-moon"></i></button>

<div class="register-box">

     <div class="register-logo">
                        <a href="index.html">
                            <img src="images/icons/signature-white.png" alt="IMG-LOGO" data-logofixed="images/icons/signature-logo.png">
                        </a>
                    </div>

    <div class="title-section-ourmenu t-center m-b-22">
                <span class="tit2 t-center">
                   Create Account
                </span>

                <h3 class="tit3 t-center m-b-35 m-t-5">
                    Join Our Dining Experience
                </h3>
            </div>

    
    <form>
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>

        <!-- PASSWORD -->
        <div class="password-box">
            <input type="password" id="password" placeholder="Password" required>
            <i class="fa-solid fa-eye" id="togglePassword"></i>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="password-box">
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            <i class="fa-solid fa-eye" id="toggleConfirm"></i>
        </div>

        <button type="submit">Register</button>
    </form>

    <!-- SOCIAL -->
    <div class="social-login">
        <p>Or sign up using</p>

        <div class="social-icons">
            <a href="#" class="social-btn facebook">
                <i class="fa-brands fa-facebook"></i>
            </a>

            <a href="#" class="social-btn google">
                <i class="fa-brands fa-google"></i>
            </a>

            <a href="#" class="social-btn twitter">
                <i class="fa-brands fa-twitter"></i>
            </a>

            <a href="#" class="social-btn apple">
                <i class="fa-brands fa-apple"></i>
            </a>
        </div>
    </div>

    <div class="login-link">
        Already have an account? <a href="login.html">Login</a>
    </div>

</div>

<script>
// Apply immediately to prevent flash
(function(){ if(localStorage.getItem('theme')!=='light') document.body.classList.add('dark'); })();

function setAuthTheme(theme){
    const btn = document.getElementById('auth-theme-btn');
    if(theme === 'dark'){
        document.body.classList.add('dark');
        btn.innerHTML = '<i class="fa-solid fa-sun"></i>';
    } else {
        document.body.classList.remove('dark');
        btn.innerHTML = '<i class="fa-solid fa-moon"></i>';
    }
    localStorage.setItem('theme', theme);
}
document.getElementById('auth-theme-btn').addEventListener('click', function(){
    setAuthTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
});
setAuthTheme(localStorage.getItem('theme') ?? 'dark');

const togglePassword = document.querySelector('#togglePassword');
const password = document.querySelector('#password');
togglePassword.addEventListener('click', function () {
    password.type = password.type === 'password' ? 'text' : 'password';
    this.classList.toggle('fa-eye-slash');
});

const toggleConfirm = document.querySelector('#toggleConfirm');
const confirmPassword = document.querySelector('#confirmPassword');
toggleConfirm.addEventListener('click', function () {
    confirmPassword.type = confirmPassword.type === 'password' ? 'text' : 'password';
    this.classList.toggle('fa-eye-slash');
});
</script>

</body>
</html>
